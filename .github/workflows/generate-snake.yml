name: Generate Snake

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC = 12:00 KST daily
  workflow_dispatch:
  push:
    branches: [master, main]

permissions:
  contents: write

concurrency:
  group: generate-snake
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation (brand colors)
        uses: Platane/snk@v3
        with:
          github_user_name: kimjinhyuk
          outputs: |
            dist/snake.svg?color_snake=%232dd4bf&color_dots=%231a1a1a,%23404040,%232dd4bf,%235eead4,%23fafafa

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
