name: Generate Snake & Cache Stats

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC = 12:00 KST daily
  workflow_dispatch:
  push:
    branches: [master, main]

permissions:
  contents: write

concurrency:
  group: generate-snake
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation (brand colors)
        uses: Platane/snk@v3
        with:
          github_user_name: kimjinhyuk
          outputs: |
            dist/snake.svg?color_snake=%232dd4bf&color_dots=%231a1a1a,%23404040,%232dd4bf,%235eead4,%23fafafa

      - name: Cache stats SVGs from github-readme-stats
        run: |
          mkdir -p dist

          fetch_with_retry() {
            local url="$1"
            local out="$2"
            for attempt in 1 2 3; do
              if curl -sSL --max-time 30 "$url" -o "${out}.tmp" && [ -s "${out}.tmp" ]; then
                if head -c 5 "${out}.tmp" | grep -qiE '<svg|<\?xml'; then
                  mv "${out}.tmp" "${out}"
                  echo "ok: $out ($(wc -c < ${out}) bytes)"
                  return 0
                fi
              fi
              echo "attempt $attempt failed for $(basename ${out}); retrying in 8s..."
              sleep 8
            done
            rm -f "${out}.tmp"
            echo "WARN: all attempts failed for $(basename ${out}); previous version kept (if any)"
          }

          STATS_BASE="bg_color=0a0a0a&title_color=2dd4bf&text_color=fafafa&icon_color=2dd4bf&hide_border=true"

          fetch_with_retry \
            "https://github-readme-stats.vercel.app/api?username=kimjinhyuk&show_icons=true&hide=stars,issues&${STATS_BASE}" \
            "dist/stats.svg"

          fetch_with_retry \
            "https://github-readme-stats.vercel.app/api/top-langs?username=kimjinhyuk&layout=compact&${STATS_BASE}" \
            "dist/top-langs.svg"

          echo "--- dist contents ---"
          ls -la dist/

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
